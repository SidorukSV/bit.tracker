services:
  postgres:
    image: postgres:16
    container_name: bit_tracker_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: tracker
      POSTGRES_DB: tracker
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker -d tracker"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: bit_tracker_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  server:
    build:
      context: ../server
    container_name: bit_tracker_server
    restart: unless-stopped
    environment:
      PORT: 4000
      DATABASE_URL: postgres://tracker:tracker@postgres:5432/tracker
      JWT_SECRET: super-secret
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
      MINIO_BUCKET: task-files
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "4000:4000"

  client:
    build:
      context: ../client
      args:
        VITE_API_URL: /api
    container_name: bit_tracker_client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "8080:80"

volumes:
  pg_data:
  minio_data:
